    <script>
        (function () {
            var ad = {
                title: 'Sponsored',
                headline: 'Shop for your Unisex Shoes and Bags at affordable prices',
                subtext: 'ORDER NOW',
                type: 'image',
                src: './assets/img/Jabu%20Ad%202.jpeg',
                href: 'https://wa.me/message/UWVV4UIZX4H6M1'
            };

            function normalizeMediaUrl(url) {
                if (!url) return '';
                var u = String(url);
                u = u.replace(/\\/g, '/');
                u = u.replace(/ /g, '%20');
                return u;
            }

            function renderMedia(container, ad) {
                if (!container || !ad) return;
                container.innerHTML = '<div class=\"absolute inset-0 bg-gradient-to-r from-transparent to-slate-900/40 md:to-transparent\"></div>';

                var safeSrc = '';
                try { safeSrc = encodeURI(normalizeMediaUrl(ad.src)); } catch (e) { safeSrc = normalizeMediaUrl(ad.src); }

                if (ad.type === 'video') {
                    var v = document.createElement('video');
                    v.src = safeSrc;
                    v.muted = true;
                    v.playsInline = true;
                    v.loop = true;
                    v.autoplay = true;
                    v.preload = 'auto';
                    v.style.maxWidth = '100%';
                    v.style.maxHeight = '70vh';
                    v.style.width = 'auto';
                    v.style.height = 'auto';
                    v.style.objectFit = 'contain';
                    v.onerror = function () {
                        var fallback = normalizeMediaUrl(ad.src);
                        if (fallback && v.src !== fallback) v.src = fallback;
                    };
                    container.appendChild(v);
                    return;
                }

                var img = document.createElement('img');
                img.src = safeSrc;
                img.alt = ad.title || 'Sponsored';
                img.style.maxWidth = '100%';
                img.style.maxHeight = '70vh';
                img.style.width = 'auto';
                img.style.height = 'auto';
                img.style.objectFit = 'contain';
                img.onerror = function () {
                    var fallback = normalizeMediaUrl(ad.src);
                    if (fallback && img.src !== fallback) img.src = fallback;
                };
                container.appendChild(img);
            }

            function showModal(ad) {
                var backdrop = document.getElementById('adModalBackdrop');
                var media = document.getElementById('adModalMedia');
                var head = document.getElementById('adModalHeadline');
                var sub = document.getElementById('adModalSubtext');
                var cta = document.getElementById('adModalCta');
                var closeBtn = document.getElementById('adModalClose');

                if (!backdrop || !media || !cta || !closeBtn) return;

                if (head) head.textContent = ad.headline || 'Sponsored';
                if (sub) sub.textContent = ad.subtext || '';
                renderMedia(media, ad);

                cta.onclick = function () {
                    window.open(ad.href, '_blank', 'noopener');
                };

                closeBtn.onclick = function () {
                    backdrop.classList.add('hidden');
                    backdrop.classList.remove('flex');
                };

                backdrop.classList.remove('hidden');
                backdrop.classList.add('flex');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function () { showModal(ad); });
            } else {
                showModal(ad);
            }
        })();
    </script>
