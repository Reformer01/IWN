<head>

<title>Hotspot > Logout</title>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<style type="text/css">
	textarea,input,select {
		background-color: #2E8B57;
		border: 1px #BBBBBB solid;
		padding: 2px;
		margin: 1px;
		font-size: 14px;
		color: white;
	}

	.tabula{ 
		border-width: 1px; 
		border-collapse: collapse; 
		border-color: #c1c1c1; 
		background-color: transparent;
		font-family: verdana;
		font-size: 11px;
	}

	body{ 
		background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url(./bgimage_logout.jpg), center;
		background-size: cover;
		color: white;
		font-size: 20px; 
		font-family: verdana; 
	}

	a, a:link, a:visited, a:active { 
		color: #2E8B57; 
		text-decoration: none; 
		font-size: 12px; 
	}
	a:hover { 
		border-bottom: 1px dotted #2E8B57; 
		color: #2E8B57; 
	}
	img {
		border: none;
	}
	td { 
		font-size: 12px; padding: 4px;
	}
</style>
</head>

<body>
<img src="logo2.png" style="height:70px;width:320px;margin-left:1000px;margin-top:10px;">
<script language="JavaScript">
<!--
    function openLogin() {
	if (window.name != 'hotspot_logout') return true;
	open('$(link-login)', '_blank', '');
	window.close();
	return false;
    }
//-->
</script>

<table width="100%" height="100%">

<tr>
<td align="center" valign="middle">
<h2 style="text-transform: uppercase;">You have just logged out</h2> <br><br>
<table class="tabula" border="1">  
<tr><td align="right">user name</td><td>$(username)</td></tr>
<tr><td align="right">IP address</td><td>$(ip)</td></tr>
<tr><td align="right">MAC address</td><td>$(mac)</td></tr>
<tr><td align="right">session time</td><td>$(uptime)</td></tr>
$(if session-time-left)
<tr><td align="right">time left</td><td>$(session-time-left)</td></tr>
$(endif)
<tr><td align="right">bytes up/down:</td><td>$(bytes-in-nice) / $(bytes-out-nice)</td></tr>
</table>
<br>
<form action="$(link-login)" name="login" onSubmit="return openLogin()">
<input type="submit" value="Log in">
</form>
</td>
</table>
</body>
</html>
